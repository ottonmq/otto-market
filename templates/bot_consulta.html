{% extends "base.html" %}
{% block content %}
<div class="terminal-container">
    <div class="scanner-line"></div>
    
    <div class="interface-header">
        <span class="status-dot blink"></span> 
        [OPERADOR_ACTIVO: {{ request.user.username|upper }}] 
        <span class="model-tag">NUCLÉO_GEMMA_3</span>
    </div>

    <div id="display-matrix" class="chat-matrix">
        <p class="sys-text">>> CARGANDO PROTOCOLO SHADOW...</p>
        <p class="sys-text">>> CONEXIÓN CON OTTO-MARKET-DB: [ONLINE]</p>
    </div>

    <div class="input-sector">
        <input type="text" id="command-input" placeholder="ESPERANDO ÓRDENES..." autocomplete="off">
        <button id="execute-bolt" onclick="dispararAgente()">ENTER</button>
    </div>
</div>

<style>
    :root { --p-neon: #00f3ff; --p-magenta: #ff00ff; --p-dark: #080808; }
    .terminal-container { 
        background: var(--p-dark); border: 2px solid var(--p-neon);
        max-width: 900px; margin: 20px auto; position: relative;
        font-family: 'Share Tech Mono', monospace; overflow: hidden;
    }
    .scanner-line {
        width: 100%; height: 4px; background: rgba(0, 243, 255, 0.5);
        position: absolute; top: 0; left: 0; animation: scan 3s linear infinite;
        box-shadow: 0 0 15px var(--p-neon); z-index: 5;
    }
    .interface-header {
        background: var(--p-neon); color: #000; padding: 10px;
        font-weight: bold; display: flex; justify-content: space-between;
    }
    .chat-matrix {
        height: 400px; overflow-y: auto; padding: 20px;
        background: radial-gradient(circle, #101010 0%, #000 100%);
    }
    .user-line { color: var(--p-magenta); margin-bottom: 10px; }
    .bot-line { color: var(--p-neon); border-left: 3px solid var(--p-neon); padding-left: 10px; margin-bottom: 15px; }
    .input-sector { display: flex; padding: 15px; border-top: 1px solid var(--p-neon); }
    #command-input {
        flex: 1; background: transparent; border: none; color: var(--p-neon);
        font-size: 1.2rem; outline: none;
    }
    #execute-bolt {
        background: var(--p-magenta); border: none; color: white;
        padding: 10px 25px; cursor: pointer; font-weight: bold;
        box-shadow: 0 0 10px var(--p-magenta);
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    .blink { animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>

<script>
async function dispararAgente() {
    const input = document.getElementById('command-input');
    const display = document.getElementById('display-matrix');
    const msg = input.value.trim();
    if(!msg) return;

    // Nombre dinámico del usuario
    display.innerHTML += `<div class="user-line">[ {{ request.user.username|upper }} ]: ${msg}</div>`;
    input.value = '';

    const formData = new URLSearchParams();
    formData.append('msg', msg);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    try {
        // CONEXIÓN DIRECTA AL VIEWS.PY
        const response = await fetch("{% url 'bot_consulta' %}", {
            method: "POST",
            body: formData
        });
        const data = await response.json();
        display.innerHTML += `<div class="bot-line"><b>[SHADOW]:</b> ${data.reply}</div>`;
    } catch (e) {
        display.innerHTML += `<div class="bot-line" style="color:red;">[ERROR]: EL AGENTE NO RESPONDE. VERIFICAR LOGS EN RENDER.</div>`;
    }
    display.scrollTop = display.scrollHeight;
}
</script>

<div style="margin-bottom: 150px; display: block; width: 100%; height: 1px;"></div>

<style>
    /* Forzamos a que el último elemento tenga aire abajo */
    main, section, .container {
        padding-bottom: 100px !important;
    }
</style>
{% endblock %}
