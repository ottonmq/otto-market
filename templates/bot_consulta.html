{% extends "base.html" %}
{% block content %}
<div style="background: #000; color: #00f3ff; min-height: 80vh; padding: 20px; font-family: monospace;">
    <h2>[SHADOW_AGENT]: JM MARKET INTERFACE</h2>
    <div id="chat-box" style="height: 400px; overflow-y: auto; border: 1px solid #00f3ff; padding: 10px; margin-bottom: 10px;">
        <p>[SISTEMA]: Esperando órdenes...</p>
    </div>

    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-msg" style="flex: 1; background: #111; color: #00f3ff; border: 1px solid #00f3ff; padding: 10px;" placeholder="Escribe aquí...">
        <button onclick="enviarMensaje()" style="background: #00f3ff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">ENVIAR</button>
    </div>
</div>

<script>
async function enviarMensaje() {
    const input = document.getElementById('user-msg');
    const box = document.getElementById('chat-box');
    const msg = input.value;
    if(!msg) return;

    box.innerHTML += `<p style="color: #ff00ff;">> ${msg}</p>`;
    input.value = '';

    const response = await fetch("", {
        method: "POST",
        headers: { "X-CSRFToken": "{{ csrf_token }}", "Content-Type": "application/x-www-form-urlencoded" },
        body: `msg=${msg}`
    });
    const data = await response.json();
    box.innerHTML += `<p style="color: #00f3ff;">[SHADOW]: ${data.reply}</p>`;
    box.scrollTop = box.scrollHeight;
}
</script>
{% endblock %}
