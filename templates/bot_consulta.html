{% extends "base.html" %}
{% block content %}
<div class="shadow-wrapper">
    <div class="shadow-container">
        <div class="shadow-header">
            <span class="blink">●</span> [SHADOW_AGENT] INTERFACE V4.0
        </div>
        
        <div id="chat-box" class="shadow-terminal">
            <p class="sys-msg">[SISTEMA]: Enlace con otto-market-db establecido...</p>
            <p class="sys-msg">[SISTEMA]: Esperando órdenes de Dmfhdilyd...</p>
        </div>

        <div class="shadow-input-area">
            <input type="text" id="user-msg" placeholder="INGRESAR COMANDO..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
            <button onclick="enviarMensaje()">EJECUTAR</button>
        </div>
    </div>
</div>

<style>
    .shadow-wrapper { display: flex; justify-content: center; padding: 20px; background: #080808; }
    .shadow-container { 
        width: 100%; max-width: 800px; background: #000; border: 2px solid #00f3ff;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); font-family: 'Courier New', monospace;
    }
    .shadow-header { 
        background: #00f3ff; color: #000; padding: 10px; font-weight: bold; 
        text-transform: uppercase; letter-spacing: 2px;
    }
    .shadow-terminal { 
        height: 400px; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.9);
        color: #00f3ff; border-bottom: 1px solid #00f3ff;
    }
    .shadow-input-area { display: flex; padding: 10px; gap: 10px; background: #111; }
    #user-msg { 
        flex: 1; background: #000; border: 1px solid #00f3ff; color: #00f3ff; 
        padding: 12px; outline: none;
    }
    .shadow-input-area button { 
        background: #00f3ff; border: none; color: #000; padding: 10px 20px; 
        font-weight: bold; cursor: pointer; text-transform: uppercase;
    }
    .sys-msg { color: #00f3ff; opacity: 0.7; font-size: 0.9em; }
    .user-msg { color: #ff00ff; margin: 10px 0; }
    .bot-msg { color: #00f3ff; border-left: 3px solid #00f3ff; padding-left: 10px; margin: 10px 0; }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
</style>

<script>
async function enviarMensaje() {
    const input = document.getElementById('user-msg');
    const box = document.getElementById('chat-box');
    const msg = input.value.trim();
    if(!msg) return;

    box.innerHTML += `<p class="user-msg">> ${msg}</p>`;
    input.value = '';
    box.scrollTop = box.scrollHeight;

    const formData = new URLSearchParams();
    formData.append('msg', msg);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    try {
        const response = await fetch(window.location.href, {
            method: "POST",
            headers: { 
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: formData.toString()
        });
        const data = await response.json();
        box.innerHTML += `<p class="bot-msg">🤖 SHADOW: ${data.reply}</p>`;
    } catch (e) {
        box.innerHTML += `<p style="color:red;">[ERROR]: Enlace fallido.</p>`;
    }
    box.scrollTop = box.scrollHeight;
}
</script>
{% endblock %}
