<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Shadow Agent // JM Market Premium</title>
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --tech-red: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }

        /* ESCÁNER CYBERPUNK OTTO-TASK */
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); opacity: 0.3; animation: scan 4s infinite linear; z-index: 100; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .otto-frame { height: 100vh; display: flex; flex-direction: column; }
        #log { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; }

        /* ESTILO NEÓN TECH */
        .msg { background: rgba(13, 13, 15, 0.9); border-left: 3px solid var(--neon); padding: 15px; box-shadow: 0 0 10px rgba(0, 243, 255, 0.05); }
        .user { border-left: none; border-right: 3px solid var(--tech-red); align-self: flex-end; }

        /* ÁREA DE INPUT */
        .input-area { background: #000; border-top: 1px solid #1a1a1c; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #080808; border: 1px solid #333; color: var(--neon); padding: 12px; outline: none; }

        /* BOTÓN TECH CON PARTÍCULAS (OPTIMIZADO) */
        #btn { position: relative; background: var(--neon); color: #000; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; overflow: hidden; }
        #particulas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="otto-frame">
        <div id="log">
            <div class="msg"><strong>[SHADOW_AGENT]:</strong> JM Market cargado. Sistema local activo sin clave externa.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ingresar comando...">
            <button id="btn">ENVIAR <canvas id="particulas"></canvas></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particulas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn');

        // EFECTO DE PARTÍCULAS SIN BLOQUEO
        function emitir() {
            canvas.width = btn.offsetWidth; canvas.height = btn.offsetHeight;
            for(let i=0; i<15; i++) {
                ctx.fillStyle = "#000";
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
            }
        }

        btn.onclick = async () => {
            const input = document.getElementById('userInput');
            const log = document.getElementById('log');
            if(!input.value) return;

            emitir();
            log.innerHTML += `<div class="msg user"><strong>[USER]:</strong> ${input.value}</div>`;
            
            // CONEXIÓN AL VIEW (SIN KEY)
            const response = await fetch('', {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'msg=' + input.value
            });
            const data = await response.json();
            
            log.innerHTML += `<div class="msg"><strong>[SHADOW_AGENT]:</strong> ${data.reply}</div>`;
            input.value = '';
            log.scrollTop = log.scrollHeight;
        };
    </script>
</body>
</html>
