<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JM Market // Shadow Agent</title>
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --red: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Escáner Cyberpunk */
        .scanner { position: absolute; top:0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); animation: s 4s infinite linear; z-index: 10; }
        @keyframes s { 0% {top:0} 100% {top:100%} }

        #log { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #1a1a1c; z-index: 5; }
        .msg { margin-bottom: 15px; padding: 10px; border-left: 2px solid var(--neon); background: rgba(0, 243, 255, 0.05); }

        /* Barra de Entrada (Garantizado que se vea abajo) */
        .input-box { background: #000; border-top: 2px solid var(--neon); padding: 20px; display: flex; gap: 10px; z-index: 20; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #333; color: var(--neon); padding: 15px; outline: none; }
        button { background: var(--neon); color: #000; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="scanner"></div>
    <div id="log">
        <div class="msg"><strong>[SHADOW_AGENT]:</strong> JM Market cargado. Conexión establecida con la llave del .env.</div>
    </div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="ORDEN DE SISTEMA..." autocomplete="off">
        <button onclick="enviar()">EJECUTAR</button>
    </div>

    <script>
        async function enviar() {
            const i = document.getElementById('userInput');
            const l = document.getElementById('log');
            if(!i.value) return;

            l.innerHTML += `<div class="msg" style="border-color:var(--red);">[USER]: ${i.value}</div>`;
            const val = i.value;
            i.value = '';

            const res = await fetch('', {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'msg=' + encodeURIComponent(val)
            });
            const data = await res.json();
            l.innerHTML += `<div class="msg">[SHADOW]: ${data.reply}</div>`;
            l.scrollTop = l.scrollHeight;
        }
    </script>
</body>
</html>
