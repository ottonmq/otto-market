

{% extends "base.html" %}
{% block content %}
<div class="shadow-wrapper">
    <div id="cyber-scanner"></div>
    
    <div class="shadow-container">
        <div class="shadow-header">
            <span class="blink">●</span> [SHADOW_AGENT] NUCLEO_GEMMA_3_V.2026
        </div>

        <div id="chat-box" class="shadow-terminal">
            <p class="sys-msg">[SISTEMA]: Enlace con otto-market-db establecido...</p>
            <p class="sys-msg">[SISTEMA]: Arquitecto Dmfhdilyd detectado. Acceso concedido.</p>
        </div>

        <div class="shadow-input-area">
            <div class="input-glow">
                <input type="text" id="user-msg" placeholder="INGRESAR COMANDO..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
            </div>
            <button onclick="enviarMensaje()" id="btn-ejecutar">EJECUTAR</button>
        </div>
    </div>
</div>

<style>
    :root {
        --neon-cyan: #00f3ff;
        --neon-magenta: #ff00ff;
        --dark-void: #050505;
    }

    .shadow-wrapper { 
        display: flex; justify-content: center; padding: 40px 20px; 
        background: var(--dark-void); position: relative; min-height: 80vh;
        overflow: hidden;
    }

    /* EFECTO ESCÁNER */
    #cyber-scanner {
        width: 100%; height: 2px; background: var(--neon-cyan);
        position: absolute; top: 0; left: 0;
        box-shadow: 0 0 15px var(--neon-cyan);
        animation: scanning 4s linear infinite;
        z-index: 100; pointer-events: none;
    }

    @keyframes scanning {
        0% { top: 0; }
        100% { top: 100%; }
    }

    .shadow-container { 
        width: 100%; max-width: 800px; background: rgba(0,0,0,0.95); 
        border: 1px solid var(--neon-cyan);
        box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
        font-family: 'Courier New', monospace; z-index: 10;
    }

    .shadow-header { 
        background: var(--neon-cyan); color: #000; padding: 12px; 
        font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 5px white;
    }

    .shadow-terminal { 
        height: 450px; overflow-y: auto; padding: 25px;
        background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
        color: var(--neon-cyan); scrollbar-width: thin;
    }

    .shadow-input-area { display: flex; padding: 15px; gap: 15px; background: #000; }
    
    .input-glow { flex: 1; position: relative; }
    #user-msg { 
        width: 100%; background: #000; border: 1px solid var(--neon-cyan); 
        color: var(--neon-cyan); padding: 12px; outline: none;
        box-shadow: inset 0 0 5px var(--neon-cyan);
    }

    #btn-ejecutar { 
        background: transparent; border: 1px solid var(--neon-magenta); 
        color: var(--neon-magenta); padding: 10px 25px; 
        font-weight: bold; cursor: pointer; transition: 0.3s;
        box-shadow: 0 0 10px var(--neon-magenta);
    }

    #btn-ejecutar:hover {
        background: var(--neon-magenta); color: #000;
        box-shadow: 0 0 20px var(--neon-magenta);
    }

    .bot-msg { 
        color: var(--neon-cyan); border-left: 2px solid var(--neon-cyan); 
        padding-left: 15px; margin: 15px 0; text-shadow: 0 0 5px var(--neon-cyan);
    }

    .user-msg { color: var(--neon-magenta); margin: 15px 0; text-align: right; }
    .blink { animation: blink 1s infinite; }
</style>

<script>
async function enviarMensaje() {
    const input = document.getElementById('user-msg');
    const box = document.getElementById('chat-box');
    const msg = input.value.trim();
    if(!msg) return;

    box.innerHTML += `<div class="user-msg">[DMFHDILYD]: ${msg}</div>`;
    input.value = '';
    box.scrollTop = box.scrollHeight;

    const formData = new URLSearchParams();
    formData.append('msg', msg);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    try {
        const response = await fetch(window.location.href, {
            method: "POST",
            headers: { 
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: formData.toString()
        });
        const data = await response.json();
        box.innerHTML += `<div class="bot-msg"><b>[SHADOW]:</b> ${data.reply}</div>`;
    } catch (e) {
        box.innerHTML += `<p style="color:red;">[SISTEMA_FALLO]: Enlace interrumpido.</p>`;
    }
    box.scrollTop = box.scrollHeight;
}
</script>
{% endblock %}
